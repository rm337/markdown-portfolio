<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Deck DJ | Inkspirations Studios</title>
<meta name="description" content="An immersive live DJ room for Inkspirations Studios with a visible performer and interactive electronic music.">
<style>
*{box-sizing:border-box}
:root{--bg:#02050c;--panel:#071426;--cyan:#54dcff;--blue:#0877f2;--ice:#e9fbff;--amber:#ffbd68;--green:#8ff3c4}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ice);font-family:Inter,"Segoe UI",Arial,sans-serif}
body{overflow-x:hidden}
.deck{min-height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 36%,rgba(8,119,242,.28),transparent 26%),radial-gradient(circle at 18% 20%,rgba(84,220,255,.14),transparent 24%),linear-gradient(180deg,#030712,#071426 56%,#02050c)}
.deck:before{content:"";position:absolute;inset:-20%;background:conic-gradient(from 200deg at 50% 0,transparent,rgba(84,220,255,.09),transparent 20%,rgba(8,119,242,.12),transparent 45%);filter:blur(10px);animation:sweep 10s ease-in-out infinite alternate}
nav{position:relative;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:1rem clamp(1rem,4vw,2.5rem);border-bottom:1px solid rgba(255,255,255,.1);background:rgba(2,5,12,.72);backdrop-filter:blur(16px)}
nav a{color:var(--ice);text-decoration:none;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.72rem}
.controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.play{border:1px solid rgba(84,220,255,.7);background:linear-gradient(180deg,#0a83ef,#0551a8);color:white;border-radius:999px;padding:.8rem 1.1rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 25px rgba(8,119,242,.35)}
.play[aria-pressed="true"]{background:linear-gradient(180deg,#159a72,#08704e);border-color:var(--green)}
.status{font-size:.72rem;color:rgba(233,251,255,.75);font-weight:700}
.stage{position:relative;z-index:5;min-height:calc(100vh - 72px);display:grid;place-items:end center;padding:3rem 1rem 1.5rem}
.halo{position:absolute;left:50%;top:42%;width:min(72vw,760px);aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(84,220,255,.35);box-shadow:0 0 60px rgba(84,220,255,.25),inset 0 0 60px rgba(8,119,242,.12);animation:pulse 3.5s ease-in-out infinite}
.live{position:absolute;z-index:14;top:2.2rem;left:50%;transform:translateX(-50%);padding:.45rem .8rem;border:1px solid rgba(84,220,255,.6);background:rgba(2,5,12,.76);font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;box-shadow:0 0 24px rgba(84,220,255,.25)}
.performance{position:relative;width:min(1080px,96vw);height:min(760px,80vh);min-height:600px;display:grid;place-items:end center}
.dj{position:absolute;z-index:10;left:50%;bottom:250px;width:300px;height:390px;transform:translateX(-50%);animation:groove 1.2s ease-in-out infinite;filter:drop-shadow(0 18px 30px rgba(0,0,0,.5))}
.head{position:absolute;left:50%;top:0;width:104px;height:126px;transform:translateX(-50%);border-radius:46% 46% 42% 42%;background:radial-gradient(circle at 32% 26%,rgba(255,255,255,.22),transparent 17%),linear-gradient(135deg,#d9a17a 0%,#bd7d59 48%,#794733 100%);box-shadow:inset -14px -18px 24px rgba(66,28,15,.32),inset 10px 5px 14px rgba(255,224,192,.14)}
.hair{position:absolute;z-index:3;left:50%;top:-12px;width:116px;height:62px;transform:translateX(-50%);border-radius:58px 58px 24px 24px;background:radial-gradient(circle at 30% 25%,#39404d,#111722 55%,#070a10);box-shadow:inset 0 -8px 12px rgba(0,0,0,.5)}
.brow{position:absolute;top:45px;width:28px;height:4px;border-radius:4px;background:#4b2c24}.brow.l{left:18px;transform:rotate(-4deg)}.brow.r{right:18px;transform:rotate(4deg)}
.eye{position:absolute;top:53px;width:14px;height:7px;border-radius:50%;background:#f4f7f8;box-shadow:0 0 10px rgba(84,220,255,.7)}.eye:after{content:"";position:absolute;left:5px;top:1px;width:5px;height:5px;border-radius:50%;background:#142335}.eye.l{left:25px}.eye.r{right:25px}
.nose{position:absolute;left:50%;top:57px;width:13px;height:28px;transform:translateX(-50%);border-radius:50% 50% 45% 45%;background:linear-gradient(90deg,rgba(93,48,33,.18),rgba(255,218,185,.18),rgba(83,38,25,.32));box-shadow:2px 2px 4px rgba(66,28,15,.2)}
.mouth{position:absolute;left:50%;top:92px;width:34px;height:10px;transform:translateX(-50%);border-bottom:3px solid #64392f;border-radius:50%}
.beard{position:absolute;left:50%;bottom:5px;width:76px;height:45px;transform:translateX(-50%);border-radius:18px 18px 38px 38px;background:linear-gradient(180deg,transparent,#513428 38%,#2b211d 100%);opacity:.58}
.neck{position:absolute;left:50%;top:112px;width:46px;height:45px;transform:translateX(-50%);background:linear-gradient(90deg,#8e553d,#c5825d,#75432f)}
.headphones{position:absolute;z-index:4;left:50%;top:44px;width:154px;height:104px;transform:translateX(-50%);border:10px solid #101723;border-top-color:#202b3e;border-radius:70px 70px 34px 34px;pointer-events:none}.headphones:before,.headphones:after{content:"";position:absolute;top:43px;width:32px;height:50px;border-radius:12px;background:linear-gradient(180deg,#26344a,#090d15);border:1px solid rgba(84,220,255,.35);box-shadow:0 0 14px rgba(84,220,255,.22)}.headphones:before{left:-17px}.headphones:after{right:-17px}
.torso{position:absolute;left:50%;top:145px;width:210px;height:200px;transform:translateX(-50%);border-radius:58px 58px 28px 28px;background:radial-gradient(circle at 50% 18%,rgba(84,220,255,.14),transparent 28%),linear-gradient(135deg,#1c2a42,#09101d 58%,#03060c);border:1px solid rgba(84,220,255,.22);box-shadow:inset -24px -18px 30px rgba(0,0,0,.32),0 0 40px rgba(8,119,242,.18)}
.torso:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(180deg,rgba(84,220,255,.55),transparent)}
.arm{position:absolute;top:174px;width:142px;height:31px;border-radius:30px;background:linear-gradient(180deg,#263651,#0d1626);box-shadow:inset 0 -8px 12px rgba(0,0,0,.3)}.arm.left{left:-4px;transform-origin:18px 50%;animation:leftArm 3.8s ease-in-out infinite}.arm.right{right:-4px;transform-origin:124px 50%;animation:rightArm 3.2s ease-in-out infinite}
.hand{position:absolute;top:-4px;width:35px;height:39px;border-radius:45% 45% 50% 50%;background:linear-gradient(135deg,#d49a72,#8a5139);box-shadow:inset -5px -7px 8px rgba(77,36,23,.25)}.arm.left .hand{right:-18px}.arm.right .hand{left:-18px}
.booth{position:relative;z-index:8;width:min(1040px,96vw);height:270px;border:1px solid rgba(233,251,255,.18);border-radius:24px 24px 8px 8px;background:linear-gradient(180deg,rgba(18,38,67,.96),rgba(3,8,16,.98));box-shadow:0 -20px 80px rgba(84,220,255,.12),0 34px 110px rgba(0,0,0,.62);display:grid;grid-template-columns:1fr 1.05fr 1fr;gap:1rem;padding:1.2rem}
.deck-unit,.mixer{position:relative;margin-top:1.1rem;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.34));box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.deck-unit{display:grid;place-items:center}.platter{width:min(210px,22vw);aspect-ratio:1;border-radius:50%;background:repeating-radial-gradient(circle,#05070d 0 6px,#121a28 7px 10px);border:5px solid #111827;box-shadow:0 0 28px rgba(84,220,255,.18),inset 0 0 28px rgba(0,0,0,.8);animation:spin 1.1s linear infinite;animation-play-state:paused}.playing .platter{animation-play-state:running}
.label{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle,var(--cyan),#0b1020 64%);box-shadow:0 0 18px rgba(84,220,255,.55)}
.mixer{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;padding:1rem;align-items:end}.channel{display:grid;justify-items:center;gap:.55rem}.knob{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#edfaff,#31445e 46%,#080c13 72%)}.meter{width:20px;height:92px;display:flex;flex-direction:column-reverse;gap:3px}.meter i{display:block;height:8px;border-radius:3px;background:rgba(84,220,255,.14)}.playing .meter i:nth-child(-n+5){background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.eq{position:absolute;z-index:9;left:50%;bottom:295px;transform:translateX(-50%);height:82px;display:flex;align-items:end;gap:5px}.eq span{width:8px;height:18px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--cyan),var(--blue));box-shadow:0 0 10px rgba(84,220,255,.55)}.playing .eq span{animation:eq .62s ease-in-out infinite}.eq span:nth-child(2n){animation-delay:-.18s}.eq span:nth-child(3n){animation-delay:-.33s}
.note{position:absolute;z-index:15;left:1rem;bottom:1rem;max-width:350px;padding:.8rem 1rem;border:1px solid rgba(84,220,255,.22);background:rgba(2,5,12,.72);backdrop-filter:blur(12px);font-size:.78rem;color:rgba(233,251,255,.75)}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.04);opacity:.8}}@keyframes sweep{to{transform:translateX(5%) rotate(3deg)}}@keyframes groove{50%{transform:translateX(-50%) translateY(8px) rotate(.5deg)}}@keyframes leftArm{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-14deg) translate(36px,28px)}}@keyframes rightArm{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(16deg) translate(-32px,26px)}}@keyframes eq{50%{height:74px}}
@media(max-width:800px){nav{align-items:flex-start}.status{display:none}.stage{padding-top:2rem;min-height:1100px}.performance{height:930px;min-height:930px}.dj{bottom:230px;transform:translateX(-50%) scale(.82)}.booth{height:245px;gap:.35rem;padding:.55rem}.platter{min-width:92px}.mixer{gap:.2rem;padding:.45rem}.eq{bottom:270px}.note{position:relative;left:auto;bottom:auto;margin:1rem}}
</style>
</head>
<body>
<main class="deck" id="deck">
<nav><a href="index.html">Inkspirations Studios</a><div class="controls"><button class="play" id="playButton" type="button" aria-pressed="false">▶ Play Flight Deck Mix</button><span class="status" id="status">DJ ready</span></div></nav>
<section class="stage" aria-label="Live animated DJ performance">
<div class="halo" aria-hidden="true"></div><div class="live">Live DJ</div>
<div class="performance">
<div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div class="dj" role="img" aria-label="Realistic animated DJ wearing headphones and mixing music"><div class="hair"></div><div class="head"><i class="brow l"></i><i class="brow r"></i><i class="eye l"></i><i class="eye r"></i><i class="nose"></i><i class="mouth"></i><i class="beard"></i></div><div class="neck"></div><div class="headphones"></div><div class="torso"></div><div class="arm left"><i class="hand"></i></div><div class="arm right"><i class="hand"></i></div></div>
<div class="booth"><div class="deck-unit"><div class="platter"><div class="label"></div></div></div><div class="mixer" id="mixer"></div><div class="deck-unit"><div class="platter"><div class="label"></div></div></div></div>
</div>
<p class="note">Music begins only after you press Play, because browsers block automatic audio. Use the same button to stop it.</p>
</section>
</main>
<script>
(()=>{
const deck=document.getElementById('deck'),button=document.getElementById('playButton'),status=document.getElementById('status'),mixer=document.getElementById('mixer');
for(let c=0;c<4;c++){const ch=document.createElement('div');ch.className='channel';ch.innerHTML='<i class="knob"></i><i class="knob"></i><div class="meter">'+Array.from({length:8},()=>'<i></i>').join('')+'</div>';mixer.appendChild(ch)}
let ctx,master,compressor,timer,playing=false,step=0;const active=new Set(),tempo=120,beat=60/tempo,scale=[110,130.81,146.83,164.81,196,220,261.63];
function track(n){active.add(n);n.addEventListener?.('ended',()=>active.delete(n));return n}
function tone(f,w,d,v,type='sine',cut=1800){const o=track(ctx.createOscillator()),g=ctx.createGain(),fl=ctx.createBiquadFilter();o.type=type;o.frequency.setValueAtTime(f,w);fl.type='lowpass';fl.frequency.value=cut;g.gain.setValueAtTime(.0001,w);g.gain.exponentialRampToValueAtTime(v,w+.01);g.gain.exponentialRampToValueAtTime(.0001,w+d);o.connect(fl);fl.connect(g);g.connect(master);o.start(w);o.stop(w+d+.03)}
function kick(w){const o=track(ctx.createOscillator()),g=ctx.createGain();o.frequency.setValueAtTime(150,w);o.frequency.exponentialRampToValueAtTime(46,w+.18);g.gain.setValueAtTime(.95,w);g.gain.exponentialRampToValueAtTime(.0001,w+.24);o.connect(g);g.connect(master);o.start(w);o.stop(w+.25)}
function noise(w,v=.1){const len=Math.floor(ctx.sampleRate*.06),b=ctx.createBuffer(1,len,ctx.sampleRate),data=b.getChannelData(0);for(let i=0;i<len;i++)data[i]=Math.random()*2-1;const s=track(ctx.createBufferSource()),f=ctx.createBiquadFilter(),g=ctx.createGain();s.buffer=b;f.type='highpass';f.frequency.value=6200;g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(.0001,w+.055);s.connect(f);f.connect(g);g.connect(master);s.start(w)}
function bar(){if(!playing)return;const start=ctx.currentTime+.05,root=scale[(step/16)%scale.length|0],pat=[0,2,4,2,5,4,2,1];for(let i=0;i<16;i++){const w=start+i*beat/4;if(i%4===0)kick(w);noise(w,i%4===2?.15:.07);if(i%4===0)tone(root/2,w,beat*.8,.22,'sawtooth',560);if(i%2===0)tone(scale[(pat[(i/2)%pat.length]+step/16)%scale.length|0]*2,w,beat*.43,.075,'triangle',2600)}tone(root,start,beat*3.8,.08,'sine',1300);tone(root*1.5,start,beat*3.8,.05,'sine',1600);step=(step+16)%112}
async function start(){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)throw new Error('Audio unsupported');ctx=ctx||new AC();if(ctx.state==='suspended')await ctx.resume();master=master||ctx.createGain();compressor=compressor||ctx.createDynamicsCompressor();try{master.disconnect()}catch(e){}try{compressor.disconnect()}catch(e){}master.gain.value=.78;compressor.threshold.value=-20;compressor.ratio.value=6;compressor.attack.value=.008;compressor.release.value=.18;master.connect(compressor);compressor.connect(ctx.destination);playing=true;step=0;bar();timer=setInterval(bar,beat*4*1000);deck.classList.add('playing');button.textContent='■ Stop Flight Deck Mix';button.setAttribute('aria-pressed','true');status.textContent='Live mix playing'}
function stop(){playing=false;clearInterval(timer);active.forEach(n=>{try{n.stop?.()}catch(e){}});active.clear();try{master.disconnect()}catch(e){}try{compressor.disconnect()}catch(e){}deck.classList.remove('playing');button.textContent='▶ Play Flight Deck Mix';button.setAttribute('aria-pressed','false');status.textContent='DJ ready'}
button.addEventListener('click',async()=>{button.disabled=true;try{playing?stop():await start()}catch(e){status.textContent='Audio could not start. Check that this tab is not muted.';console.error(e)}finally{button.disabled=false}})
})();
</script>
</body>
</html>
