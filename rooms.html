<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Studio Rooms | Inkspirations Studios</title><link rel="stylesheet" href="css/rooms.css"><link rel="stylesheet" href="css/atmosphere.css"><link rel="stylesheet" href="css/surface-light.css"><link rel="stylesheet" href="studio-music.css"></head><body class="room-system-page"><div data-room-atmosphere></div><nav class="room-hub-nav"><a class="room-brand" href="index.html">Inkspirations Studios</a><div class="room-hub-links"><a href="index.html">Home</a><a href="portfolio.html">Portfolio</a><a href="index.html#contact">Contact</a></div></nav><main><header class="room-hub-hero"><p class="room-kicker">Studio Rooms</p><h1 id="roomHubTitle">Choose a room and step inside.</h1><p id="roomHubDescription">Ocean light, floating ink, writing, listening, and the deeper creative rooms of Inkspirations Studios.</p></header><section class="room-hub-grid" data-room-cards></section></main><script src="js/rooms.js"></script><script>(()=>{function tidyRoomView(){const hash=window.location.hash.replace('#','');if(!hash)return;const active=document.querySelector(`[data-room-card="${CSS.escape(hash)}"]`);if(active)active.remove();const room=window.InkRooms&&window.InkRooms.byId?window.InkRooms.byId(hash):null;const title=document.getElementById('roomHubTitle');const description=document.getElementById('roomHubDescription');if(room&&title&&description){title.textContent=room.title;description.textContent=room.description;}document.querySelectorAll('[data-room-cards] .room-card').forEach(card=>{if(card.getAttribute('href')===window.location.pathname.split('/').pop()+window.location.hash)card.remove();});}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',tidyRoomView);else tidyRoomView();window.addEventListener('hashchange',()=>window.location.reload());})();</script><script src="atmosphere.js"></script><script src="studio-audio.js"></script><script src="studio-music.js"></script></body></html>
